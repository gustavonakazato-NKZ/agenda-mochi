<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda do Deputado Junior Mochi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; -webkit-tap-highlight-color: transparent; }
        .card { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1); }
        
        .unauthorized-bar { background-color: #fef9c3; border-left: 6px solid #eab308; }
        .logo-glow { filter: drop-shadow(0 0 10px rgba(79, 70, 229, 0.3)); }

        /* Ajustes Mobile */
        @media (max-width: 640px) {
            .input-group { grid-template-columns: 1fr !important; }
            h1 { font-size: 1.25rem !important; }
            .tab-btn { font-size: 0.7rem !important; padding: 0.75rem 0.2rem !important; }
            .card-appointment { flex-direction: column !important; }
            .time-display { width: 100% !important; margin-bottom: 0.5rem; font-size: 1.5rem !important; }
            .search-container { flex-direction: column !important; }
        }

        @media print {
            body > *:not(.print-container) { display: none !important; }
            .print-container { display: block !important; width: 100%; font-size: 10pt; color: #000; }
            .pdf-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #4f46e5; padding-bottom: 10px; margin-bottom: 20px; }
            table { width: 100%; border-collapse: collapse; table-layout: fixed; }
            th, td { border: 1px solid #000; padding: 6px; text-align: left; font-size: 8.5pt; word-wrap: break-word; }
            th { background-color: #f3f4f6; }
            .date-header { background-color: #eee; border: 1px solid #000; padding: 4px 8px; font-weight: bold; margin-top: 15px; }
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, addDoc, setDoc, getDoc, getDocs, onSnapshot, collection, query, where, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'agenda-mochi-producao';

        // Preservando suas configurações de conexão
        const firebaseConfig = {
            apiKey: "AIzaSyA2XQWBb3NwkvGD6estEub9xkQPjvzxzXE",
            authDomain: "banco-dados-agenda.firebaseapp.com",
            projectId: "banco-dados-agenda",
            storageBucket: "banco-dados-agenda.firebasestorage.app",
            messagingSenderId: "652360130180",
            appId: "1:652360130180:web:9cf98606920f9284b72cd1"
        };

        let db, auth, currentUserData = null;
        let appointments = [];
        let users = [];
        let isFirebaseConnected = false;
        let editingUserCpf = null;
        const logoUrl = "https://lh3.googleusercontent.com/d/1qpnoVc0Qy2Y3i9CMxjS0reoQTrhiP2b4";

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            
            const initAuth = async () => {
                try {
                    const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                    if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
                    else await signInAnonymously(auth);
                    isFirebaseConnected = true;
                    console.log("Firebase conectado.");
                } catch (err) { console.error("Erro na conexão:", err); }
            };
            initAuth();
        } catch (e) { console.error(e); }

        // --- SISTEMA DE LOGIN ---
        window.handleLogin = async (e) => {
            if(e) e.preventDefault();
            if (!isFirebaseConnected) return alert("Conectando ao banco de dados...");

            const cpf = document.getElementById('login-cpf').value.replace(/\D/g, '');
            const pass = document.getElementById('login-pass').value;

            if (!cpf || !pass) return alert("Preencha CPF e Senha.");

            try {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', cpf));
                if (userDoc.exists()) {
                    const ud = userDoc.data();
                    if (ud.status === 'Suspenso') return alert("Acesso suspenso. Procure o administrador.");
                    if (ud.password === pass) {
                        currentUserData = ud;
                        enterApp();
                        return;
                    }
                }
                
                if (cpf === '00000000000' && pass === 'admin123') {
                    const usersSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
                    if (usersSnap.empty) {
                        currentUserData = { cpf: '00000000000', name: 'Administrador Inicial', role: 'Administrador', status: 'Ativo' };
                        enterApp();
                    } else alert("Acesso mestre desativado.");
                } else alert("Dados incorretos.");
            } catch (err) { alert("Erro de conexão."); }
        };

        const enterApp = () => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-user-info').textContent = `${currentUserData.name} (${currentUserData.role})`;
            document.getElementById('tab-admin-btn').classList.toggle('hidden', currentUserData.role !== 'Administrador');
            document.getElementById('tab-form-btn').classList.toggle('hidden', currentUserData.role === 'Visitante');
            document.getElementById('import-btn').classList.toggle('hidden', !['Administrador', 'Principal'].includes(currentUserData.role));
            switchTab(currentUserData.role === 'Visitante' ? 'list' : 'form');
            startDataListeners();
        };

        const startDataListeners = () => {
            onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'appointments')), (snap) => {
                appointments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAppointments();
            });
            if (currentUserData.role === 'Administrador') {
                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'users')), (snap) => {
                    users = snap.docs.map(doc => doc.data());
                    renderUsers();
                });
            }
        };

        // --- AGENDA E BUSCA ---
        const renderAppointments = () => {
            const container = document.getElementById('appointments-list');
            container.innerHTML = '';
            
            const filter = document.getElementById('list-filter').value;
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const searchDate = document.getElementById('search-date').value;
            const todayStr = new Date().toISOString().split('T')[0];

            let filtered = appointments.filter(app => {
                if (currentUserData.role === 'Visitante' && (!app.authorized || app.date < todayStr)) return false;
                if (filter !== 'Ambos' && app.activity_type !== filter) return false;
                if (searchDate && app.date !== searchDate) return false;
                if (searchText) {
                    const content = `${app.details} ${app.location} ${app.contact}`.toLowerCase();
                    if (!content.includes(searchText)) return false;
                }
                return true;
            });

            // Ordenação: Hoje primeiro, depois futuro para passado
            filtered.sort((a, b) => {
                if (a.date === todayStr && b.date !== todayStr) return -1;
                if (b.date === todayStr && a.date !== todayStr) return 1;
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                return a.time.localeCompare(b.time);
            });

            let currentDay = '';
            filtered.forEach(app => {
                if (app.date !== currentDay) {
                    const h = document.createElement('h2');
                    const isToday = app.date === todayStr;
                    h.className = `text-lg font-bold mt-6 mb-2 border-b px-2 flex justify-between items-center ${isToday ? 'border-green-500 text-green-700 bg-green-50 rounded-t-lg' : 'border-indigo-200 text-indigo-700'}`;
                    h.innerHTML = `<span>${app.date.split('-').reverse().join('/')}</span> ${isToday ? '<span class="text-[10px] bg-green-500 text-white px-2 py-0.5 rounded-full uppercase">Hoje</span>' : ''}`;
                    container.appendChild(h);
                    currentDay = app.date;
                }
                
                const isHap = app.status === 'Acontecendo';
                const isAuth = app.authorized === true || app.authorized === "true";
                const canManage = ['Administrador', 'Principal'].includes(currentUserData.role);
                
                const card = document.createElement('div');
                card.className = `card p-4 mb-3 rounded-xl mx-2 transition card-appointment flex ${!isAuth ? 'unauthorized-bar' : (isHap ? 'bg-red-50 ring-1 ring-red-300' : 'bg-white')}`;
                card.innerHTML = `
                    <div class="text-2xl font-black w-20 time-display flex-shrink-0 ${isHap ? 'text-red-700' : (app.activity_type === 'Campanha' ? 'text-green-900' : 'text-indigo-600')}">${app.time}</div>
                    <div class="flex-grow">
                        <p class="font-bold text-gray-800 text-lg sm:text-base">${app.details}</p>
                        <div class="text-sm text-gray-500 mt-1 space-y-1">
                            <div><b>Local:</b> ${app.location || '-'} | <b>Contato:</b> ${app.contact || '-'}</div>
                            <div class="flex gap-4">
                                <span class="text-[10px] font-bold uppercase text-indigo-400">${app.activity_type}</span>
                                ${app.press_coverage === 'Acompanhar' ? '<span class="text-[10px] font-bold text-indigo-700 underline">Imprensa</span>' : ''}
                            </div>
                        </div>
                        ${!isAuth ? '<div class="mt-2 text-[10px] font-bold text-yellow-600 uppercase italic">Aguardando Autorização</div>' : ''}
                    </div>
                    <div class="flex sm:flex-col gap-2 ml-2 justify-end">
                        ${canManage ? `<button onclick="window.toggleAuth('${app.id}', ${!isAuth})" class="p-2 bg-gray-100 rounded-lg">${isAuth ? '🔓' : '✅'}</button>` : ''}
                        ${currentUserData.role !== 'Visitante' ? `
                            <button onclick="window.editApp('${app.id}')" class="p-2 bg-blue-50 text-blue-600 rounded-lg">✎</button>
                            <button onclick="window.deleteApp('${app.id}')" class="p-2 bg-red-50 text-red-600 rounded-lg">✕</button>
                        ` : ''}
                    </div>`;
                container.appendChild(card);
            });
            if (!filtered.length) container.innerHTML = '<p class="text-center py-10 text-gray-400">Nenhum evento encontrado.</p>';
        };

        // --- GESTÃO DE USUÁRIOS ---
        window.saveUser = async (e) => {
            e.preventDefault();
            const cpf = document.getElementById('u-cpf').value.replace(/\D/g, '');
            if(!cpf) return alert("CPF obrigatório");
            const data = {
                cpf,
                name: document.getElementById('u-name').value,
                password: document.getElementById('u-pass').value,
                role: document.getElementById('u-role').value,
                status: document.getElementById('u-status').value
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', cpf), data);
            alert("Usuário salvo com sucesso!");
            window.resetUserForm();
        };

        window.resetUserForm = () => {
            document.getElementById('user-form').reset();
            document.getElementById('u-cpf').disabled = false;
            document.getElementById('u-title').textContent = "Cadastrar Novo Acesso";
            document.getElementById('u-btn').textContent = "CRIAR ACESSO";
            editingUserCpf = null;
        };

        const renderUsers = () => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            users.forEach(u => {
                const isSusp = u.status === 'Suspenso';
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl border mb-2 flex justify-between items-center cursor-pointer transition ${isSusp ? 'bg-red-50 border-red-200' : 'bg-gray-50'}`;
                div.onclick = () => {
                    editingUserCpf = u.cpf;
                    document.getElementById('u-cpf').value = u.cpf;
                    document.getElementById('u-cpf').disabled = true;
                    document.getElementById('u-name').value = u.name;
                    document.getElementById('u-pass').value = u.password;
                    document.getElementById('u-role').value = u.role;
                    document.getElementById('u-status').value = u.status || 'Ativo';
                    document.getElementById('u-title').textContent = "Editar Acesso";
                    document.getElementById('u-btn').textContent = "ATUALIZAR DADOS";
                };
                div.innerHTML = `<div><b>${u.name}</b> ${isSusp ? '<span class="text-red-600 text-[10px] font-bold">[SUSPENSO]</span>' : ''}<br><span class="text-xs text-gray-500">${u.role}</span></div>
                                 <button onclick="event.stopPropagation(); window.deleteUser('${u.cpf}')" class="text-red-400">✕</button>`;
                list.appendChild(div);
            });
        };

        // --- PDF E IMPORTAÇÃO ---
        window.exportPDFTable = () => {
            const start = document.getElementById('exp-start').value;
            const end = document.getElementById('exp-end').value;
            
            // Correção da lógica de filtro: Verifica boleano E string "true"
            let filtered = appointments.filter(a => {
                const isAuth = a.authorized === true || String(a.authorized) === "true";
                const inRange = (!start || a.date >= start) && (!end || a.date <= end);
                return isAuth && inRange;
            });

            if (!filtered.length) return alert("Não foram encontrados eventos autorizados para este período ou verifique as datas.");
            
            let html = `
                <div class="print-container">
                    <div class="pdf-header">
                        <img src="${logoUrl}" style="height: 60px;">
                        <div style="text-align: right">
                            <h1 style="margin:0; color:#4f46e5; font-size: 18pt;">AGENDA OFICIAL</h1>
                            <p style="margin:0">Deputado Junior Mochi</p>
                        </div>
                    </div>`;
            const grouped = {};
            filtered.forEach(app => { if(!grouped[app.date]) grouped[app.date] = []; grouped[app.date].push(app); });
            Object.keys(grouped).sort().reverse().forEach(date => {
                html += `<div class="date-header">DATA: ${date.split('-').reverse().join('/')}</div>
                         <table><thead><tr style="background:#f3f4f6"><th>Hora - Atividade</th><th>Compromisso</th><th>Local</th><th>Contato</th></tr></thead><tbody>`;
                grouped[date].forEach(app => {
                    const isRed = app.status === 'Acontecendo' ? 'color:red; font-weight:bold' : '';
                    html += `<tr style="${isRed}"><td>${app.time} - ${app.activity_type}</td><td>${app.details}</td><td>${app.location || '-'}</td><td>${app.contact || '-'}</td></tr>`;
                });
                html += `</tbody></table>`;
            });
            const win = window.open('', '_blank');
            win.document.write(`<html><head><style>body{font-family:sans-serif;padding:20px} table{width:100%;border-collapse:collapse;margin-bottom:20px} th,td{border:1px solid #000;padding:6px;font-size:9pt} .date-header{background:#eee;padding:4px;font-weight:bold;border:1px solid #000}</style></head><body>${html}</body></html>`);
            win.document.close();
            setTimeout(() => win.print(), 500);
        };

        window.importExcel = (e) => {
            const file = e.target.files[0];
            const isAuth = document.getElementById('imp-auth').checked;
            const type = document.getElementById('imp-type').value;
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(evt.target.result), {type:'array'}).Sheets[0]);
                const batch = writeBatch(db);
                json.forEach(row => {
                    const newDoc = doc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'));
                    batch.set(newDoc, {
                        date: String(row.Data || ''),
                        time: String(row.Horario || '00:00'),
                        details: String(row.Compromisso || ''),
                        location: String(row.Local || ''),
                        contact: String(row.Contato || ''),
                        activity_type: type,
                        authorized: isAuth,
                        press_coverage: String(row.Imprensa || '').toLowerCase().includes('sim') ? 'Acompanhar' : 'Não Acompanhar',
                        status: String(row.Status || '').toLowerCase().includes('acontecendo') ? 'Acontecendo' : ''
                    });
                });
                await batch.commit();
                alert("Importado!");
                document.getElementById('import-modal').classList.add('hidden');
            };
            reader.readAsArrayBuffer(file);
        };

        // --- AUXILIARES ---
        const switchTab = (tab) => {
            ['form-view', 'list-view', 'admin-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(tab + '-view').classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
            document.getElementById('tab-' + tab + '-btn').classList.add('bg-indigo-600', 'text-white');
        };

        const resetAppForm = () => {
            document.getElementById('appointment-form').reset();
            document.getElementById('app-id').value = '';
            document.getElementById('app-date').value = new Date().toISOString().split('T')[0];
        };

        window.onload = () => {
            document.getElementById('app-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('tab-form-btn').onclick = () => { resetAppForm(); switchTab('form'); };
            document.getElementById('tab-list-btn').onclick = () => switchTab('list');
            document.getElementById('tab-admin-btn').onclick = () => switchTab('admin');
            document.getElementById('list-filter').onchange = renderAppointments;
            document.getElementById('search-input').oninput = renderAppointments;
            document.getElementById('search-date').onchange = renderAppointments;
            document.getElementById('import-file').onchange = window.importExcel;
        };

        window.toggleAuth = async (id, s) => await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', id), {authorized: s}, {merge:true});
        window.editApp = (id) => {
            const a = appointments.find(x => x.id === id);
            switchTab('form');
            document.getElementById('app-id').value = a.id;
            document.getElementById('app-date').value = a.date;
            document.getElementById('app-time').value = a.time;
            document.getElementById('app-details').value = a.details;
            document.getElementById('app-activity').value = a.activity_type;
            document.getElementById('app-location').value = a.location || '';
            document.getElementById('app-contact').value = a.contact || '';
            document.getElementById('app-status').checked = a.status === 'Acontecendo';
        };
        window.deleteApp = async (id) => confirm("Apagar?") && await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', id));
        window.deleteUser = async (cpf) => confirm("Apagar usuário?") && await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', cpf));
    </script>
</head>
<body class="pb-20 sm:pb-10">

    <div id="login-screen" class="fixed inset-0 bg-indigo-900 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl text-center">
            <img src="https://lh3.googleusercontent.com/d/1qpnoVc0Qy2Y3i9CMxjS0reoQTrhiP2b4" alt="Logo" class="h-24 mx-auto mb-6 logo-glow">
            <h1 class="text-2xl font-black text-indigo-900 mb-6 uppercase tracking-tight">Agenda Mochi</h1>
            <form onsubmit="window.handleLogin(event)" class="space-y-4">
                <input type="text" id="login-cpf" class="w-full bg-gray-50 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 border-0" placeholder="CPF">
                <input type="password" id="login-pass" class="w-full bg-gray-50 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 border-0" placeholder="Senha">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition">ENTRAR</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="max-w-4xl mx-auto p-4 pt-6">
            <header class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex items-center space-x-3">
                    <img src="https://lh3.googleusercontent.com/d/1qpnoVc0Qy2Y3i9CMxjS0reoQTrhiP2b4" alt="Logo" class="h-12 logo-glow">
                    <div>
                        <h1 class="text-xl font-black text-indigo-900 leading-none">Agenda Junior Mochi</h1>
                        <p id="display-user-info" class="text-indigo-500 text-xs font-bold"></p>
                    </div>
                </div>
                <div class="flex w-full sm:w-auto gap-2">
                    <button id="import-btn" onclick="document.getElementById('import-modal').classList.remove('hidden')" class="flex-1 sm:flex-none px-4 py-2 bg-purple-600 text-white text-[10px] font-bold rounded-xl">IMPORTAR</button>
                    <button onclick="document.getElementById('export-modal').classList.remove('hidden')" class="flex-1 sm:flex-none px-4 py-2 bg-green-600 text-white text-[10px] font-bold rounded-xl">PDF</button>
                    <button onclick="location.reload()" class="px-4 py-2 bg-gray-200 text-gray-600 text-[10px] font-bold rounded-xl">SAIR</button>
                </div>
            </header>

            <div class="flex border-b border-gray-200 mb-6 bg-white rounded-t-2xl overflow-hidden">
                <button id="tab-form-btn" class="tab-btn flex-1 py-4 font-bold transition">CADASTRO</button>
                <button id="tab-list-btn" class="tab-btn flex-1 py-4 font-bold transition">AGENDA</button>
                <button id="tab-admin-btn" class="tab-btn flex-1 py-4 font-bold transition hidden">EQUIPE</button>
            </div>

            <!-- CADASTRO -->
            <div id="form-view">
                <div class="card bg-white p-6 rounded-3xl">
                    <form onsubmit="window.saveAppointment(event)" id="appointment-form" class="space-y-4">
                        <input type="hidden" id="app-id">
                        <div class="grid grid-cols-2 gap-4 input-group">
                            <input type="date" id="app-date" required class="bg-gray-50 rounded-xl p-4 border-0 outline-none">
                            <input type="time" id="app-time" required class="bg-gray-50 rounded-xl p-4 border-0 outline-none">
                        </div>
                        <textarea id="app-details" rows="3" required class="w-full bg-gray-50 rounded-xl p-4 border-0 outline-none" placeholder="O que será feito?"></textarea>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <input type="text" id="app-contact" class="bg-gray-50 rounded-xl p-4 border-0" placeholder="Contato">
                            <select id="app-activity" class="bg-gray-50 rounded-xl p-4 border-0"><option value="Mandato">Mandato</option><option value="Campanha">Campanha</option></select>
                            <select id="app-press" class="bg-gray-50 rounded-xl p-4 border-0"><option value="Não Acompanhar">Imprensa: Não</option><option value="Acompanhar">Imprensa: Sim</option></select>
                        </div>
                        <input type="text" id="app-location" class="w-full bg-gray-50 rounded-xl p-4 border-0" placeholder="Local">
                        <div class="flex items-center bg-red-50 p-4 rounded-2xl border border-red-100">
                            <input type="checkbox" id="app-status" class="w-6 h-6 text-red-600 rounded"><label class="ml-3 font-bold text-red-600">ACONTECENDO</label>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl">SALVAR REGISTRO</button>
                    </form>
                </div>
            </div>

            <!-- AGENDA COM BUSCA -->
            <div id="list-view" class="hidden">
                <div class="mb-6 bg-white p-4 rounded-2xl border mx-2 space-y-3">
                    <div class="flex gap-2 search-container">
                        <input type="text" id="search-input" placeholder="Buscar termo..." class="flex-grow bg-gray-50 rounded-xl p-3 text-sm border-0 outline-none">
                        <input type="date" id="search-date" class="bg-gray-50 rounded-xl p-3 text-sm border-0 outline-none sm:w-40">
                    </div>
                    <select id="list-filter" class="w-full text-sm font-bold text-gray-700 bg-transparent outline-none">
                        <option value="Ambos">TUDO (Mandato e Campanha)</option>
                        <option value="Mandato">APENAS MANDATO</option>
                        <option value="Campanha">APENAS CAMPANHA</option>
                    </select>
                </div>
                <div id="appointments-list"></div>
            </div>

            <!-- ADMIN -->
            <div id="admin-view" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mx-2">
                    <div class="card bg-white p-6 rounded-3xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 id="u-title" class="font-bold text-indigo-600 uppercase text-sm">Novo Acesso</h3>
                            <button onclick="window.resetUserForm()" class="text-[10px] bg-indigo-50 px-2 rounded">+ NOVO</button>
                        </div>
                        <form onsubmit="window.saveUser(event)" id="user-form" class="space-y-3">
                            <input type="text" id="u-cpf" placeholder="CPF" class="w-full bg-gray-50 rounded-xl p-4 border-0">
                            <input type="text" id="u-name" placeholder="Nome" class="w-full bg-gray-50 rounded-xl p-4 border-0">
                            <input type="password" id="u-pass" placeholder="Senha" class="w-full bg-gray-50 rounded-xl p-4 border-0">
                            <select id="u-role" class="w-full bg-gray-50 rounded-xl p-4 border-0">
                                <option value="Visitante">Visitante</option>
                                <option value="Cadastrador">Cadastrador</option>
                                <option value="Principal">Principal</option>
                                <option value="Administrador">Administrador</option>
                            </select>
                            <select id="u-status" class="w-full bg-gray-50 rounded-xl p-4 border-0">
                                <option value="Ativo">Status: Ativo</option>
                                <option value="Suspenso">Status: Suspenso</option>
                            </select>
                            <button type="submit" id="u-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">CRIAR ACESSO</button>
                        </form>
                    </div>
                    <div class="card bg-white p-6 rounded-3xl">
                        <h3 class="font-bold text-gray-700 mb-4 uppercase text-sm">Lista de Equipe</h3>
                        <div id="users-list" class="max-h-[350px] overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAIS -->
    <div id="export-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="font-bold text-lg mb-6">Gerar PDF da Agenda</h3>
            <div class="space-y-4">
                <input type="date" id="exp-start" class="w-full border rounded-xl p-4">
                <input type="date" id="exp-end" class="w-full border rounded-xl p-4">
                <button onclick="window.exportPDFTable()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl">VISUALIZAR AGORA</button>
                <button onclick="document.getElementById('export-modal').classList.add('hidden')" class="w-full py-2 text-gray-400 font-bold text-xs uppercase">FECHAR</button>
            </div>
        </div>
    </div>

    <div id="import-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center">
            <h3 class="font-bold mb-4 uppercase text-sm">Importação Coletiva</h3>
            <div class="space-y-4 text-left mb-6">
                <label class="flex items-center space-x-2 bg-gray-50 p-4 rounded-xl">
                    <input type="checkbox" id="imp-auth" checked class="w-6 h-6">
                    <span class="text-sm font-bold">Marcar como AUTORIZADO</span>
                </label>
                <select id="imp-type" class="w-full bg-gray-50 p-4 rounded-xl border-0 font-bold">
                    <option value="Mandato">Tudo de MANDATO</option>
                    <option value="Campanha">Tudo de CAMPANHA</option>
                </select>
                <input type="file" id="import-file" accept=".xlsx, .xls" class="text-xs w-full bg-gray-100 p-4 rounded-xl">
            </div>
            <button onclick="document.getElementById('import-modal').classList.add('hidden')" class="text-gray-400 text-xs font-bold uppercase">CANCELAR</button>
        </div>
    </div>

</body>
</html>
